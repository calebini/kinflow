name: Kinflow CI

on:
  pull_request:
  push:
    branches:
      - main
      - ctx002-first-slice
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
      - name: Compile check
        run: |
          targets=""
          for d in src scripts tests; do
            if [ -d "$d" ]; then
              targets="$targets $d"
            fi
          done
          python -m compileall -q $targets
      - name: Ruff check
        run: ruff check tests

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest
      - name: Run full pytest
        env:
          PYTHONPATH: src
        run: pytest -q

  contracts:
    name: contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest
      - name: Run focused contract suite
        env:
          PYTHONPATH: src
        run: |
          files=(
            tests/test_p1a_schema_migrations.py
            tests/test_packet2_schema_reconciliation.py
            tests/test_p2b_oc_adapter_conformance.py
          )
          existing=()
          for f in "${files[@]}"; do
            if [ -f "$f" ]; then
              existing+=("$f")
            fi
          done
          if [ "${#existing[@]}" -gt 0 ]; then
            pytest -q "${existing[@]}"
          else
            pytest -q
          fi
