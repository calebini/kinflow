name: Kinflow CI

on:
  pull_request:
  push:
    branches:
      - main
      - ctx002-first-slice
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
      - name: Compile check
        run: python -m compileall -q src scripts tests
      - name: Ruff check
        run: ruff check .

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest
      - name: Run full pytest
        env:
          PYTHONPATH: src
        run: pytest -q

  contracts:
    name: contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest
      - name: Run focused contract suite
        env:
          PYTHONPATH: src
        run: |
          pytest -q \
            tests/test_p1a_schema_migrations.py \
            tests/test_packet2_schema_reconciliation.py \
            tests/test_p2b_oc_adapter_conformance.py
